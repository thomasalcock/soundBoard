name: Build Soundboard

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Download and Build raylib
        run: |
          make install_raylib

      - name: Build Soundboard
        run: |
          make release

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundboard_linux_x86_64 
          path: builds/soundboard_release
          retention-days: 5    
